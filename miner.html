<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>TRV Miner</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
padding:20px;
}

#terminal{
height:300px;
overflow:auto;
border:1px solid #00ff00;
padding:10px;
margin-bottom:20px;
}

button{
background:black;
color:#00ff00;
border:1px solid #00ff00;
padding:10px;
cursor:pointer;
}

#progress{
width:100%;
background:#111;
height:20px;
margin-top:10px;
}

#bar{
height:20px;
width:0%;
background:#00ff00;
}

</style>
</head>

<body>

<h2>TRV MINER v0.1</h2>

<div id="terminal"></div>

<div id="progress">
<div id="bar"></div>
</div>

<br>

<button onclick="minerar()">INICIAR MINERAÇÃO</button>

<h3 id="reward"></h3>

<script>

let terminal = document.getElementById("terminal")

let mensagens = [
"Conectando ao nó...",
"Buscando bloco...",
"Decodificando hash...",
"Verificando rede...",
"Acessando ledger...",
"Executando algoritmo...",
"Validando transações...",
"Procurando recompensa..."
]

function linha(txt){
terminal.innerHTML += txt + "<br>"
terminal.scrollTop = terminal.scrollHeight
}

function minerar(){

terminal.innerHTML=""
document.getElementById("reward").innerText=""

let progresso = 0
let bar = document.getElementById("bar")

let intervalo = setInterval(()=>{

progresso += Math.random()*15

if(progresso >=100){

clearInterval(intervalo)

bar.style.width="100%"

linha("Bloco encontrado!")

let valores = [0,1,2,5,10]

let ganho = valores[Math.floor(Math.random()*valores.length)]

linha("Calculando recompensa...")

setTimeout(()=>{

document.getElementById("reward").innerText =
"RECOMPENSA: "+ganho+" TRV"

},1000)

return
}

bar.style.width = progresso+"%"

let msg = mensagens[Math.floor(Math.random()*mensagens.length)]

linha(msg)

},800)

}

</script>

</body>
</html>
